<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Manutenção</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header__brand">
      <div class="header__logo" id="vehicleLabel">Z400</div>
      <div class="header__subtitle">Controle de Manutenção</div>
    </div>
    <div class="header__stats">
      <div class="stat">
        <div class="stat__value" id="currentKm">—</div>
        <div class="stat__label">KM Atual</div>
      </div>
      <div class="stat">
        <div class="stat__value" id="totalRecords">0</div>
        <div class="stat__label">Registros</div>
      </div>
    </div>
  </header>

  <nav class="vehicle-tabs" id="vehicleTabs">
    <button class="vehicle-tab active" data-vehicle="z400">Z400</button>
    <button class="vehicle-tab" data-vehicle="gol">Gol 2008</button>
  </nav>

  <main>
    <div class="controls">
      <label for="sortSelect">Ordenar por:</label>
      <select id="sortSelect">
        <option value="data:desc">Data — mais recente</option>
        <option value="data:asc">Data — mais antiga</option>
        <option value="km:desc">Quilometragem — maior</option>
        <option value="km:asc">Quilometragem — menor</option>
        <option value="custo:desc">Custo — maior</option>
        <option value="custo:asc">Custo — menor</option>
      </select>
      <button class="btn-icon" id="btnRecarregar" title="Recarregar dados">↻</button>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <div class="loading">Carregando registros...</div>
    </div>
  </main>

  <button class="fab" id="btnNovaManutencao">+ Nova Manutenção</button>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal__header">
        <span class="modal__title">Nova Manutenção</span>
        <button class="modal__close" id="btnFecharModal">&times;</button>
      </div>

      <form id="formManutencao" novalidate>

        <div class="form-group">
          <label for="descricao">Descrição do serviço *</label>
          <textarea id="descricao" name="descricao" placeholder="Ex: Troca de óleo e filtro de óleo" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="dataField">Data *</label>
            <input type="date" id="dataField" name="dataField" required>
          </div>
          <div class="form-group">
            <label for="km">Quilometragem atual *</label>
            <input type="number" id="km" name="km" placeholder="Ex: 12450" min="0" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="custo">Custo (R$)</label>
            <input type="number" id="custo" name="custo" placeholder="Ex: 280" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label for="local">Local</label>
            <input type="text" id="local" name="local" placeholder="Ex: Oficina Speed">
          </div>
        </div>

        <div class="form-group">
          <label for="pecas">Peças trocadas</label>
          <input type="text" id="pecas" name="pecas" placeholder="Ex: Óleo Motul 10w40, filtro de óleo">
        </div>

        <hr class="form-divider">
        <div class="form-section-label">Próxima Manutenção</div>

        <div class="form-row">
          <div class="form-group">
            <label for="proximaData">Data prevista</label>
            <input type="date" id="proximaData" name="proximaData">
          </div>
          <div class="form-group">
            <label for="proximaKm">Quilometragem prevista</label>
            <input type="number" id="proximaKm" name="proximaKm" placeholder="Ex: 13000" min="0">
          </div>
        </div>

        <div class="form-group">
          <label for="alertaKm">Alertar a quantos km antes</label>
          <input type="number" id="alertaKm" name="alertaKm" placeholder="Ex: 500" min="0">
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
          <button type="submit" class="btn-primary" id="btnSalvar">Salvar</button>
        </div>

      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
